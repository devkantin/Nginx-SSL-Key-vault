name: Validate Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - 'bicep/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  RESOURCE_GROUP: rg-nginx-dev

jobs:
  # ─── Bicep Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep CLI
        run: az bicep install && az bicep version
      - name: Lint main.bicep
        run: az bicep lint --file bicep/main.bicep
      - name: Build Bicep to ARM JSON
        run: az bicep build --file bicep/main.bicep --outfile /tmp/main.json
      - name: Upload ARM template
        uses: actions/upload-artifact@v4
        with:
          name: arm-template
          path: /tmp/main.json
          retention-days: 3

  # ─── Shell script lint ──────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning
      - name: Run ShellCheck on tests
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './tests'
          severity: warning

  # ─── Security Scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Download ARM template
        uses: actions/download-artifact@v4
        with:
          name: arm-template
          path: /tmp
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          file: /tmp/main.json
          framework: arm
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true
      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ─── What-If Preview ────────────────────────────────────────────────────────
  what-if:
    name: What-If Preview (Dev)
    runs-on: ubuntu-latest
    needs: lint
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure dev resource group exists
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location eastus \
            --tags environment=dev project=nginx-ssl managedBy=bicep

      - name: Get deployment principal object ID
        id: sp
        run: |
          OID=$(az ad sp show --id ${{ secrets.AZURE_CLIENT_ID }} --query id -o tsv)
          echo "objectId=$OID" >> $GITHUB_OUTPUT

      - name: Validate Bicep deployment
        run: |
          az deployment group validate \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters bicep/parameters/dev.bicepparam \
            --parameters sshPublicKey="${{ secrets.NGINX_SSH_PUBLIC_KEY }}" \
            --parameters deploymentPrincipalId="${{ steps.sp.outputs.objectId }}"

      - name: Run What-If and save output
        run: |
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters bicep/parameters/dev.bicepparam \
            --parameters sshPublicKey="${{ secrets.NGINX_SSH_PUBLIC_KEY }}" \
            --parameters deploymentPrincipalId="${{ steps.sp.outputs.objectId }}" \
            --result-format FullResourcePayloads 2>&1 | tee /tmp/whatif.txt

      - name: Post What-If as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('/tmp/whatif.txt', 'utf8');
            const body = out.length > 60000 ? out.substring(0, 60000) + '\n...(truncated)' : out;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## What-If Preview — Dev\n\`\`\`\n${body}\n\`\`\``
            });
